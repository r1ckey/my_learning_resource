<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Architect - Data Engineering Portal</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            /* Emerald / Teal Theme for Data Architecture */
            --bg-color: #064e3b; /* Deep emerald */
            --sidebar-bg: rgba(6, 78, 59, 0.85);
            --content-bg: #0f3d32;
            --text-primary: #f8fafc;
            --text-secondary: #99f6e4;
            --accent-color: #10b981; /* Emerald 500 */
            --accent-hover: #34d399; /* Emerald 400 */
            --border-color: #065f46;
            --glass-border: rgba(255, 255, 255, 0.1);
            --code-bg: #022c22;
            --alert-info-bg: rgba(16, 185, 129, 0.15);
            --alert-info-border: #10b981;
            --alert-warn-bg: rgba(245, 158, 11, 0.15);
            --alert-warn-border: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            line-height: 1.7;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.2) 0px, transparent 60%),
                radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.15) 0px, transparent 60%);
        }

        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            box-shadow: 4px 0 24px rgba(0,0,0,0.3);
        }

        .sidebar-header {
            padding: 28px 24px;
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(180deg, rgba(6, 78, 59, 0.9) 0%, rgba(6, 78, 59, 0) 100%);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .sidebar-header h1 {
            font-size: 1.35rem;
            font-weight: 800;
            background: linear-gradient(135deg, #10b981 0%, #2dd4bf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
            margin-bottom: 4px;
        }

        .nav-section { padding: 16px 0; }

        .nav-section-title {
            padding: 8px 24px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #6ee7b7;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .nav-item {
            padding: 10px 24px;
            cursor: pointer;
            color: #d1fae5;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            position: relative;
            line-height: 1.4;
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            color: var(--text-primary);
            background: rgba(16, 185, 129, 0.2);
            font-weight: 600;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--accent-color);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.8);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
        }

        .content-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--content-bg);
            padding: 56px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--glass-border);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown Render Styles */
        .markdown-body h1 {
            font-size: 2.25rem; font-weight: 800; margin-bottom: 32px; padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color); color: #ffffff;
        }
        .markdown-body h2 {
            font-size: 1.5rem; font-weight: 700; margin-top: 48px; margin-bottom: 20px; color: #f8fafc; display: flex; align-items: center;
        }
        .markdown-body h2::before {
            content: ''; display: inline-block; width: 8px; height: 24px; background: var(--accent-color); margin-right: 12px; border-radius: 4px;
        }
        .markdown-body h3 { font-size: 1.25rem; font-weight: 600; margin-top: 32px; margin-bottom: 16px; color: #e2e8f0; }
        .markdown-body p, .markdown-body li { font-size: 1.05rem; color: #cbd5e1; margin-bottom: 20px; }
        .markdown-body ul, .markdown-body ol { padding-left: 28px; margin-bottom: 24px; }
        .markdown-body a { color: var(--accent-hover); text-decoration: underline; text-underline-offset: 4px; transition: color 0.2s; }
        .markdown-body a:hover { color: #6ee7b7; }
        .markdown-body hr { border: 0; height: 1px; background: var(--border-color); margin: 40px 0; }
        .markdown-body code:not(pre code) { background: rgba(255, 255, 255, 0.1); padding: 3px 6px; border-radius: 6px; font-family: 'Fira Code', monospace; font-size: 0.85em; color: #6ee7b7; }
        .markdown-body pre { background: var(--code-bg); border-radius: 12px; padding: 20px; overflow-x: auto; margin: 28px 0; border: 1px solid rgba(255,255,255,0.05); }
        .markdown-body pre code { font-family: 'Fira Code', monospace; font-size: 0.9em; color: #e2e8f0; }
        .markdown-body blockquote { border-left: 4px solid var(--accent-color); background: var(--alert-info-bg); margin: 32px 0; padding: 20px 24px; border-radius: 0 12px 12px 0; }
        .markdown-body blockquote strong { color: var(--accent-hover); }
        .markdown-body table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 32px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
        .markdown-body th, .markdown-body td { border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); padding: 16px; text-align: left; }
        .markdown-body th { background: rgba(0,0,0,0.2); font-weight: 600; color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #065f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Data Engineering Core</h1>
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">Architect Level Mastery</p>
        </div>
        <div id="nav-container"></div>
    </div>
    <div class="main-content" id="main-scroll">
        <div class="content-wrapper">
            <div id="content" class="markdown-body">
                <h2>Loading Data Governance Matrix...</h2>
            </div>
        </div>
    </div>
    <script src="portal_data.js"></script>
    <script>
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext'; return hljs.highlight(code, { language }).value;
            }, langPrefix: 'hljs language-'
        });

        document.addEventListener('DOMContentLoaded', () => {
            const navContainer = document.getElementById('nav-container');
            const contentArea = document.getElementById('content');
            if (typeof portalData === 'undefined') {
                contentArea.innerHTML = `<h2>Database Not Found</h2><p>Run python build_portal.py</p>`; return;
            }

            const order = [
                "P1Roadmap", "P1Week1", "P1Week2", "P1Week3", "P1Week4", 
                "P2Roadmap", "P2Week1", "P2Week2", "P2Week3", "P2Week4",
                "P3Roadmap", "P3Week1", "P3Week2", "P3Week3", "P3Week4",
                "P4Roadmap", "P4Week1", "P4Week2", "P4Week3", "P4Week4",
                "P5Roadmap", "P5Week1", "P5Week2", "P5Week3", "P5Week4",
                "P6Roadmap", "P6Week1", "P6Week2", "P6Week3", "P6Week4",
                "P7Roadmap", "P7Week1", "P7Week2", "P7Week3", "P7Week4"
            ];
            let isFirst = true;

            order.forEach(section => {
                if (!portalData[section] || portalData[section].length === 0) return;
                
                const sectionEl = document.createElement('div');
                sectionEl.className = 'nav-section';
                
                const titleEl = document.createElement('div');
                titleEl.className = 'nav-section-title';
                
                if (section === "P1Roadmap") titleEl.textContent = "Part 1: アーキテクチャ基礎";
                else if (section.startsWith("P1Week")) titleEl.textContent = "Part 1 - " + section.replace('P1Week', 'Week ');
                else if (section === "P2Roadmap") titleEl.textContent = "Part 2: モデリング & ETL";
                else if (section.startsWith("P2Week")) titleEl.textContent = "Part 2 - " + section.replace('P2Week', 'Week ');
                else if (section === "P3Roadmap") titleEl.textContent = "Part 3: パイプライン・ストリーム";
                else if (section.startsWith("P3Week")) titleEl.textContent = "Part 3 - " + section.replace('P3Week', 'Week ');
                else if (section === "P4Roadmap") titleEl.textContent = "Part 4: ガバナンス・未来の組織";
                else if (section.startsWith("P4Week")) titleEl.textContent = "Part 4 - " + section.replace('P4Week', 'Week ');
                else if (section === "P5Roadmap") titleEl.textContent = "🔥 Part 5: Sparkチューニング深淵";
                else if (section.startsWith("P5Week")) titleEl.textContent = "Part 5 - " + section.replace('P5Week', 'Week ');
                else if (section === "P6Roadmap") titleEl.textContent = "🔥 Part 6: 実戦データ配管工事";
                else if (section.startsWith("P6Week")) titleEl.textContent = "Part 6 - " + section.replace('P6Week', 'Week ');
                else if (section === "P7Roadmap") titleEl.textContent = "🔥 Part 7: リアルタイムKafkaの極地";
                else if (section.startsWith("P7Week")) titleEl.textContent = "Part 7 - " + section.replace('P7Week', 'Week ');
                
                sectionEl.appendChild(titleEl);

                portalData[section].forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'nav-item';
                    
                    let displayName = item.title.replace(/^\d+_/, '').replace(/_/g, ' ');
                    itemEl.textContent = displayName;
                    
                    itemEl.addEventListener('click', () => {
                        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                        itemEl.classList.add('active');
                        
                        let processContent = item.content.replace(/> \[!IMPORTANT\]/g, '> **💡 IMPORTANT**<br>')
                                                         .replace(/> \[!WARNING\]/g, '> **⚠️ WARNING**<br>')
                                                         .replace(/> \[!TIP\]/g, '> **✨ PRO TIP**<br>')
                                                         .replace(/> \[!CAUTION\]/g, '> **🚨 CAUTION**<br>');
                        
                        contentArea.innerHTML = marked.parse(processContent);
                        const wrapper = document.querySelector('.content-wrapper');
                        wrapper.style.animation = 'none';
                        setTimeout(() => wrapper.style.animation = 'fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards', 10);
                        document.getElementById('main-scroll').scrollTop = 0;
                    });
                    sectionEl.appendChild(itemEl);
                    if (isFirst) { itemEl.click(); isFirst = false; }
                });
                navContainer.appendChild(sectionEl);
            });
        });
    </script>
</body>
</html>
